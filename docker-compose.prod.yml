version: '3.8'

services:
  # Next.js Development Server with Hot Reload
  nextjs-dev:
    image: node:20-alpine
    container_name: portfolio-dev
    working_dir: /app
    command: sh -c "npm install && npm run dev"
    environment:
      - NODE_ENV=development
      - NEXT_PUBLIC_SITE_URL=${NEXT_PUBLIC_SITE_URL:-http://localhost:3000}
      - NEXT_PUBLIC_SITE_NAME=${NEXT_PUBLIC_SITE_NAME:-Portfolio}
      - NEXT_PUBLIC_CONTACT_EMAIL=${NEXT_PUBLIC_CONTACT_EMAIL}
      - WATCHPACK_POLLING=true
      - CHOKIDAR_USEPOLLING=true
    ports:
      - "3000:3000"
    volumes:
      # Mount your source code for hot reload
      - .:/app
      # Use named volume for node_modules to avoid conflicts
      - node_modules:/app/node_modules
      # Mount .next for faster rebuilds
      - .next:/app/.next
    networks:
      - portfolio-network
    stdin_open: true
    tty: true

networks:
  portfolio-network:
    driver: bridge

volumes:
  node_modules:
  .next:

