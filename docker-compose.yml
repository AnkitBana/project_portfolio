version: '3.8'

services:
  # Next.js Application
  nextjs-app:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: portfolio-nextjs
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_SITE_URL=${NEXT_PUBLIC_SITE_URL:-http://localhost:3000}
      - NEXT_PUBLIC_SITE_NAME=${NEXT_PUBLIC_SITE_NAME:-Portfolio}
      - NEXT_PUBLIC_CONTACT_EMAIL=${NEXT_PUBLIC_CONTACT_EMAIL}
    ports:
      - "3000:3000"
    networks:
      - portfolio-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: portfolio-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./public:/usr/share/nginx/html:ro
    depends_on:
      - nextjs-app
    networks:
      - portfolio-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Ngrok Tunnel (optional)
  ngrok:
    image: ngrok/ngrok:latest
    container_name: portfolio-ngrok
    restart: unless-stopped
    command:
      - "http"
      - "nginx:80"
      - "--authtoken=${NGROK_AUTHTOKEN}"
      - "--log=stdout"
    ports:
      - "4040:4040"  # Ngrok web interface
    depends_on:
      - nginx
    networks:
      - portfolio-network
    profiles:
      - ngrok  # Only start with: docker-compose --profile ngrok up

networks:
  portfolio-network:
    driver: bridge

volumes:
  nginx-cache:
    driver: local

